<!DOCTYPE html>
<html>
<head>
<title>Roadmap Viewer</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body {
    background: #0f172a;
    color: #e2e8f0;
    font-family: Arial;
    padding: 20px;
}
</style>
</head>

<body>

<h1>🚀 Roadmap</h1>

<div id="content">Loading...</div>

<script>
fetch('roadmap.md')
  .then(res => res.text())
  .then(md => {
      document.getElementById('content').innerHTML = marked.parse(md);
  });
</script>

</body>
</html>
